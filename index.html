<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Kinetic - No Overlay</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        
        /* Video tetap ada untuk sistem, tapi disembunyikan dari penglihatan */
        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Menginisialisasi Sensor Tangan...</div>
    <!-- Video element tetap wajib ada agar sistem bisa "melihat", tapi kita sembunyikan -->
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const video = document.getElementById("webcam");
const loadingEl = document.getElementById("loading");

let handLandmarker;
let lastVideoTime = -1;
let particles = [];
let targetShape = "random";
const PARTICLE_COUNT = 3000;

const NEON_COLORS = ["#00f2ff", "#0062ff", "#7000ff", "#ff00d9"];
const FRICTION = 0.88;
const EASE = 0.12;

async function init() {
    try {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        video.srcObject = stream;
        
        resize();
        createParticles();
        loadingEl.style.display = "none";
        render();
    } catch (err) {
        loadingEl.innerText = "Kamera ditolak atau tidak ditemukan.";
        console.error(err);
    }
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = 0;
        this.vy = 0;
        this.targetX = this.x;
        this.targetY = this.y;
        this.color = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
        this.size = Math.random() * 1.5 + 0.5;
        this.baseSize = this.size;
    }

    update(handData) {
        let dx = this.targetX - this.x;
        let dy = this.targetY - this.y;
        
        this.vx += dx * EASE;
        this.vy += dy * EASE;
        this.vx *= FRICTION;
        this.vy *= FRICTION;
        
        this.x += this.vx;
        this.y += this.vy;

        if (handData) {
            const hdx = this.x - handData.x;
            const hdy = this.y - handData.y;
            const dist = Math.sqrt(hdx * hdx + hdy * hdy);
            const force = Math.max(0, (200 - dist) / 200);
            this.size = this.baseSize + (force * 3 * handData.zScale);
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function createParticles() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
    }
}

function setTargets(shapeType) {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const scale = 250;

    particles.forEach((p, i) => {
        let tx, ty;
        switch (shapeType) {
            case "HEART":
                const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                tx = centerX + 16 * Math.pow(Math.sin(t), 3) * (scale / 15);
                ty = centerY - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * (scale / 15);
                break;
            case "SATURN":
                const angle = (i / PARTICLE_COUNT) * Math.PI * 2;
                if (i % 3 === 0) {
                    const rScale = scale * 1.4;
                    tx = centerX + Math.cos(angle) * rScale;
                    ty = centerY + Math.sin(angle) * (rScale * 0.3);
                    const tiltX = tx - centerX;
                    const tiltY = ty - centerY;
                    tx = centerX + (tiltX * Math.cos(0.4) - tiltY * Math.sin(0.4));
                    ty = centerY + (tiltX * Math.sin(0.4) + tiltY * Math.cos(0.4));
                } else {
                    const pR = Math.random() * scale * 0.8;
                    const pA = Math.random() * Math.PI * 2;
                    const pA2 = Math.random() * Math.PI * 2;
                    tx = centerX + pR * Math.cos(pA) * Math.sin(pA2);
                    ty = centerY + pR * Math.sin(pA) * Math.sin(pA2);
                }
                break;
            default:
                tx = p.targetX;
                ty = p.targetY;
        }
        p.targetX = tx;
        p.targetY = ty;
    });
}

let lastDetection = 0;
function detectGesture(landmarks) {
    const now = Date.now();
    if (now - lastDetection < 45) return;
    lastDetection = now;

    const fingerTips = [8, 12, 16, 20];
    const fingerPips = [6, 10, 14, 18];
    let upFingers = 0;
    
    fingerTips.forEach((tip, idx) => {
        if (landmarks[tip].y < landmarks[fingerPips[idx]].y) upFingers++;
    });

    if (upFingers >= 4) targetShape = "HEART";
    else if (upFingers === 0) targetShape = "SATURN";

    setTargets(targetShape);
}

function render() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.globalCompositeOperation = "lighter";

    if (video.currentTime !== lastVideoTime) {
        const detections = handLandmarker.detectForVideo(video, performance.now());
        if (detections.landmarks.length > 0) {
            detectGesture(detections.landmarks[0]);
        }
        lastVideoTime = video.currentTime;
    }

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(render);
}

init();
</script>
</body>
</html>
