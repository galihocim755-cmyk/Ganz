<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diki - 3K Particles Manual Zoom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #ff69b4; font-size: 11px; pointer-events: none; opacity: 0.8; z-index: 100; }
    </style>
</head>
<body>

<div id="ui">🔍 ZOOM MANUAL AKTIF (Cubit Layar/Scroll) <br> ✨ 3.000 PARTIKEL MENCAR ✨</div>

<script>
    let scene, camera, renderer, handParticles, handGeom, controls;
    const HAND_COUNT = 3000; // Sesuai request: 3rb partikel
    let targetPositions = new Float32Array(HAND_COUNT * 3);
    let handX = 0, handY = 0;

    init();
    startHandTracking();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 0, 1200); // Posisi awal kamera

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- FIXED: ORBIT CONTROLS UNTUK ZOOM MANUAL ---
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;    // Zoom Manual Aktif
        controls.minDistance = 100;    // Jarak paling deket
        controls.maxDistance = 8000;   // Jarak paling jauh

        handGeom = new THREE.BufferGeometry();
        const posArr = new Float32Array(HAND_COUNT * 3);
        const colArr = new Float32Array(HAND_COUNT * 3);

        for (let i = 0; i < HAND_COUNT; i++) {
            posArr[i*3] = (Math.random()-0.5)*5000;
            posArr[i*3+1] = (Math.random()-0.5)*3000;
            posArr[i*3+2] = (Math.random()-0.5)*1000;
            colArr[i*3] = 1.0; colArr[i*3+1] = 0.35; colArr[i*3+2] = 0.75;
        }
        handGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        handGeom.setAttribute('color', new THREE.BufferAttribute(colArr, 3));

        const handMat = new THREE.ShaderMaterial({
            transparent: true, blending: THREE.AdditiveBlending,
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 8.0 * (1000.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    float glow = pow(1.0 - d * 2.0, 2.0); 
                    gl_FragColor = vec4(vColor, glow * 0.45);
                }
            `
        });

        handParticles = new THREE.Points(handGeom, handMat);
        scene.add(handParticles);
    }

    function updateTargetShape(type) {
        for (let i = 0; i < HAND_COUNT; i++) {
            if (type === "fist") {
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                const r = 3.5; 
                targetPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i*3+2] = r * Math.cos(phi);
            } else {
                // MENCAR PARAH (3RB PARTIKEL JADI LEGA)
                targetPositions[i*3] = (Math.random()-0.5)*150.0;
                targetPositions[i*3+1] = (Math.random()-0.5)*110.0;
                targetPositions[i*3+2] = (Math.random()-0.5)*80.0;
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // EFEK ASAP (Lancar)
        const currentPos = handGeom.attributes.position.array;
        for (let i = 0; i < HAND_COUNT * 3; i++) {
            currentPos[i] += (targetPositions[i] - currentPos[i]) * 0.05;
        }
        handGeom.attributes.position.needsUpdate = true;

        // POSISI MENGIKUTI TANGAN
        const worldX = handX * 450;
        const worldY = handY * 350;
        handParticles.position.x += (worldX - handParticles.position.x) * 0.07;
        handParticles.position.y += (worldY - handParticles.position.y) * 0.07;

        // WAJIB: Update controls biar zoom manual kerasa
        controls.update(); 
        renderer.render(scene, camera);
    }

    async function startHandTracking() {
        const video = document.createElement('video');
        const hands = new Hands({ locateFile: (f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.6, minTrackingConfidence:0.6 });
        hands.onResults((res)=>{
            if(res.multiHandLandmarks && res.multiHandLandmarks.length){
                const lm = res.multiHandLandmarks[0];
                handX = (0.5 - lm[0].x) * 2.5; 
                handY = (0.5 - lm[0].y) * 2.0;
                const isFist = lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y;
                updateTargetShape(isFist ? "fist" : "open");
            }
        });
        const cameraInstance = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        cameraInstance.start();
    }
</script>
</body>
</html>
