<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diki Project Final - FIXED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
            border: 2px solid #ff69b4; border-radius: 30px; padding: 15px;
            color: white; z-index: 9999; text-align: center;
        }
        .mode-btn { width: 45%; padding: 10px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 5px; background: #444; color: #fff; }
        .active { background: #ff69b4 !important; }
        .slider-row { margin: 15px 0; display: flex; align-items: center; gap: 10px; }
        input[type=range] { flex: 1; accent-color: #ff69b4; }
        #status-info { font-size: 12px; color: #ffb7c5; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div style="margin-bottom: 10px;">
        <button id="btnSlider" class="mode-btn active">🎚️ SLIDER</button>
        <button id="btnHand" class="mode-btn">✋ TANGAN</button>
    </div>
    
    <div id="sliderArea">
        <div class="slider-row">
            <span>Tulip</span>
            <input type="range" id="morph" min="0" max="100" value="0">
            <span>Teks</span>
        </div>
    </div>

    <div id="handArea" style="display: none;">
        <p style="font-size: 11px;">Kamera Aktif! Gerakkan tanganmu ✨</p>
    </div>

    <div id="status-info">✨ Tulip • Love • Random • Teks ✨</div>
</div>

<script>
    let scene, camera, renderer, controls, particles;
    let handMode = false, cam = null;
    const COUNT = 50000;
    
    // Simpan posisi target
    let posTulip = new Float32Array(COUNT * 3);
    let posLove = new Float32Array(COUNT * 3);
    
    init();

    function init() {
        // 1. Setup Scene
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.position.z = 400;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. Buat Partikel
        const geom = new THREE.BufferGeometry();
        const initialPos = new Float32Array(COUNT * 3);
        const colors = new Float32Array(COUNT * 3);

        for(let i=0; i<COUNT; i++) {
            let i3 = i * 3;
            // Posisi Awal (Tulip)
            initialPos[i3] = (Math.random()-0.5) * 300;
            initialPos[i3+1] = (Math.random()-0.5) * 400;
            initialPos[i3+2] = (Math.random()-0.5) * 100;
            posTulip[i3] = initialPos[i3];
            posTulip[i3+1] = initialPos[i3+1];
            posTulip[i3+2] = initialPos[i3+2];

            // Posisi Target (Love/Teks)
            posLove[i3] = (Math.random()-0.5) * 100;
            posLove[i3+1] = (Math.random()-0.5) * 100;
            posLove[i3+2] = (Math.random()-0.5) * 100;

            const c = new THREE.Color().setHSL(Math.random(), 0.8, 0.6);
            colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;
        }

        geom.setAttribute('position', new THREE.BufferAttribute(initialPos, 3));
        geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        particles = new THREE.Points(geom, new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8 }));
        scene.add(particles);

        setupButtons();
        animate();
    }

    function setupButtons() {
        const btnS = document.getElementById('btnSlider');
        const btnH = document.getElementById('btnHand');
        const sArea = document.getElementById('sliderArea');
        const hArea = document.getElementById('handArea');

        btnS.onclick = () => {
            handMode = false;
            btnS.classList.add('active');
            btnH.classList.remove('active');
            sArea.style.display = 'block';
            hArea.style.display = 'none';
            if(cam) cam.stop();
        };

        btnH.onclick = () => {
            handMode = true;
            btnH.classList.add('active');
            btnS.classList.remove('active');
            hArea.style.display = 'block';
            sArea.style.display = 'none';
            startTracking();
        };
    }

    async function startTracking() {
        const video = document.createElement('video');
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });
        
        hands.onResults((res) => {
            if(!handMode || !res.multiHandLandmarks?.length) return;
            const lm = res.multiHandLandmarks[0];
            // Partikel ikut tangan
            particles.position.x = (lm[0].x - 0.5) * -400;
            particles.position.y = (lm[0].y - 0.5) * -300;
        });

        cam = new window.Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 480, height: 360
        });
        cam.start().catch(() => alert("Kamera Error/Ditolak"));
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if(!handMode) {
            const val = document.getElementById('morph').value / 100;
            const curPos = particles.geometry.attributes.position.array;
            for(let i=0; i<COUNT*3; i++) {
                const target = (val < 0.5) ? posTulip[i] : posLove[i];
                curPos[i] += (target - curPos[i]) * 0.1;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.005;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
