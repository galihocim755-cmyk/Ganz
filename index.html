<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dual Mode: Slider + Hand Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 380px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,105,180,0.4); border-radius: 40px; padding: 10px 16px;
            color: white; z-index: 10000;
        }
        .mode-buttons { display: flex; gap: 12px; margin-bottom: 10px; }
        .mode-btn { flex: 1; border: none; border-radius: 40px; padding: 6px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; background: rgba(255,255,255,0.15); color: white; }
        .mode-active { background: #ff69b4; color: white; }
        .mode-inactive { background: rgba(255,255,255,0.15); color: #ccc; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        input[type=range] { flex: 1; margin: 0 10px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.3); border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { width: 14px; height: 14px; background: #ff69b4; border-radius: 50%; cursor: pointer; -webkit-appearance: none; }
        .btn-group { display: flex; gap: 8px; margin: 10px 0; justify-content: center; }
        .btn { border: none; border-radius: 30px; padding: 6px 14px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-orange { background: #e67e22; }
        .btn-purple { background: #6a1b9a; }
        .size-control { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .info-text { font-size: 9px; text-align: center; color: #b0aac2; margin-top: 6px; }
        .gesture-toast { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
          padding: 6px 18px; border-radius: 40px; color: #ffb7c5; font-size: 16px; font-weight: bold; z-index: 10001; white-space: nowrap; pointer-events: none; border: 1px solid rgba(255,105,180,0.5); }
        @media (max-width: 550px) { .mode-btn { font-size: 10px; } .btn { font-size: 9px; } .gesture-toast { font-size: 12px; } }
    </style>
</head>
<body>
<div id="ui-panel">
    <div class="mode-buttons">
        <button id="modeSliderBtn" class="mode-btn mode-active">🎚️ SLIDER</button>
        <button id="modeHandBtn" class="mode-btn mode-inactive">✋ TANGAN</button>
    </div>
    <div class="row">
        <span style="font-size:11px">🔄 <input type="checkbox" id="lockRotation" checked></span>
        <input type="range" id="morphSlider" min="0" max="50" value="50" step="1">
        <button id="resetExplodeBtn" class="btn btn-purple" style="font-size:14px; padding:4px 12px;">↻</button>
    </div>
    <div class="btn-group">
        <button id="explodeBtn" class="btn btn-orange">💥 LEDAK (TEKS)</button>
    </div>
    <div class="size-control">
        <span style="font-size:11px">🔘 SIZE</span>
        <input type="range" id="sizeSlider" min="0" max="100" value="15" step="1">
        <span id="sizeVal" style="font-size:11px; min-width:35px">15%</span>
    </div>
    <div id="handInfo" style="display:none;">
        <div class="info-text">✋ HIDUPKAN KAMERA — gerakan tangan mengubah BENTUK partikel ✨</div>
        <div class="info-text" style="margin-top:4px;">✊🏻 bola kristal | 🖐🏻 mencar total | ✌🏻 tulisan | 🤘 simbol | 🫰🏻 love</div>
    </div>
    <div class="info-text" id="globalInfo">✨ Tulip • Love • Random • Teks ✨</div>
</div>
<div id="gestureToast" class="gesture-toast" style="display:none;">✨</div>

<script>
    // ========== SLIDER MODE ==========
    let scene, camera, renderer, sliderParticles, orbitControls, starField;
    const PARTICLE_COUNT = 70000;
    let currentMorph = 50;
    let clock = new THREE.Clock();
    let shaderMat = null;
    
    let tulipPos = [], lovePos = [], teksPos = [], randomPos = [], teksOrigPos = [];
    let loveUV = [], randomColorsArr = [];
    let teksVelocity = [], teksFloat = [];
    let explodeT = 0, explodeTarget = 0, isExploding = false;
    let currentSizePercent = 15;
    
    // ========== HAND MODE ==========
    let handModeActive = false;
    let handParticles = null;
    let handGeom = null;
    let handColorsAttr = null;
    const HAND_COUNT = 30000;
    let targetHandPositions = null;
    let handX = 0, handY = 0;
    let gestureTimer = null;
    let handCameraInstance = null;
    
    // Shape data
    let loveTextPoints = [], victoryTextPoints = [], hornSymbolPoints = [];
    
    // ========== SIMBOL FLOATING (SLIDER MODE ONLY) ==========
    let symbolParticles = null;
    let symbolTime = 0;
    
    let db = null;
    
    setTimeout(() => {
        initApp();
        animateLoop();
    }, 100);
    
    async function initApp(){
        await openDB();
        await loadFromDB();
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.2, 5000);
        camera.position.set(0, -15, 460);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.zoomSpeed = 1.2;
        
        // stars
        const starCount = 7000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0;i<starCount;i++){ starPos.push((Math.random()-0.5)*6000, (Math.random()-0.5)*3500, (Math.random()-0.5)*1800-600); }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos),3));
        starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaaccff, size: 0.45, transparent: true, opacity: 0.6 }));
        scene.add(starField);
        
        await buildShapes();
        await buildHandShapes();
        await buildSymbols(); // SIMBOL UNTUK SLIDER MODE (diperkecil)
        
        handParticles.visible = false;
        document.getElementById('handInfo').style.display = 'none';
        
        // EVENTS
        document.getElementById('modeSliderBtn').onclick = () => switchMode('slider');
        document.getElementById('modeHandBtn').onclick = () => switchMode('hand');
        document.getElementById('explodeBtn').onclick = () => { if(currentMorph>=37) { explodeTarget=50; isExploding=true; } else showTempMsg('Geser ke stage TEKS (37-50) dulu!'); };
        document.getElementById('resetExplodeBtn').onclick = () => { explodeTarget=0; isExploding=true; };
        
        const morphSlider = document.getElementById('morphSlider');
        morphSlider.oninput = (e) => { currentMorph = parseFloat(e.target.value); if(shaderMat) shaderMat.uniforms.uMix.value = currentMorph; if(currentMorph<37){ explodeTarget=0; isExploding=false; shaderMat.uniforms.uExplodeTime.value=0; } };
        const sizeSlider = document.getElementById('sizeSlider');
        sizeSlider.oninput = () => { currentSizePercent = parseFloat(sizeSlider.value); document.getElementById('sizeVal').innerText=Math.floor(currentSizePercent)+'%'; if(shaderMat) shaderMat.uniforms.uSizeScale.value = currentSizePercent/100; };
        sizeSlider.oninput();
        
        morphSlider.value = 0; currentMorph = 0; if(shaderMat) shaderMat.uniforms.uMix.value = 0;
    }
    
    async function buildSymbols(){
        // 5000 simbol (diperkecil ukurannya)
        const symbols = ['♬', '♪', '𖹭', 'ʚɞ', '⭑', 'ूाीू'];
        const symbolCount = 5000;
        
        // Canvas texture atlas (ukuran font lebih kecil)
        const canvas = document.createElement('canvas');
        canvas.width = 2048;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.font = 'bold 100px "Segoe UI", "Arial Unicode MS"'; // DARI 150px JADI 100px
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        symbols.forEach((s, i) => {
            ctx.fillText(s, 170 + i * 340, 128);
        });
        const texture = new THREE.CanvasTexture(canvas);
        
        const symbolGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(symbolCount * 3);
        const randArr = new Float32Array(symbolCount);
        const symIdxArr = new Float32Array(symbolCount);
        
        for(let i=0; i<symbolCount; i++){
            positions[i*3] = (Math.random() - 0.5) * 8000;
            positions[i*3+1] = (Math.random() - 0.5) * 6000;
            positions[i*3+2] = (Math.random() - 0.5) * 3000;
            randArr[i] = Math.random();
            symIdxArr[i] = Math.floor(Math.random() * symbols.length);
        }
        symbolGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
        symbolGeo.setAttribute('aRandom', new THREE.BufferAttribute(randArr,1));
        symbolGeo.setAttribute('aSymbolIdx', new THREE.BufferAttribute(symIdxArr,1));
        
        const symbolShaderMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTex: { value: texture },
                uNumSymbols: { value: symbols.length }
            },
            transparent: true,
            depthTest: false,
            blending: THREE.AdditiveBlending,
            vertexShader: `
                uniform float uTime;
                uniform float uNumSymbols;
                attribute float aRandom;
                attribute float aSymbolIdx;
                varying float vSymbolIdx;
                varying float vAlpha;
                void main() {
                    vSymbolIdx = aSymbolIdx;
                    vec3 pos = position;
                    float speed = 25.0;
                    pos.y += mod(uTime * speed + (aRandom * 6000.0), 6000.0) - 3000.0;
                    pos.x += sin(uTime * 0.2 + aRandom * 20.0) * 200.0;
                    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
                    // UKURAN LEBIH KECIL (8-16 pixel)
                    gl_PointSize = (8.0 + aRandom * 8.0) * (1500.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                    vAlpha = smoothstep(-3000.0, -2000.0, pos.y) * smoothstep(3000.0, 2000.0, pos.y);
                }
            `,
            fragmentShader: `
                uniform sampler2D uTex;
                uniform float uNumSymbols;
                varying float vSymbolIdx;
                varying float vAlpha;
                void main() {
                    vec2 uv = vec2(gl_PointCoord.x, 1.0 - gl_PointCoord.y);
                    uv.x = (uv.x + vSymbolIdx) / uNumSymbols;
                    vec4 texColor = texture2D(uTex, uv);
                    vec3 pinkGlow = vec3(1.0, 0.3, 0.7);
                    gl_FragColor = vec4(pinkGlow, texColor.a * vAlpha * 0.45);
                }
            `
        });
        
        symbolParticles = new THREE.Points(symbolGeo, symbolShaderMat);
        scene.add(symbolParticles);
    }
    
    async function buildHandShapes(){
        // I LOVE BEBY
        const loveCanvas = document.createElement('canvas');
        loveCanvas.width = 800; loveCanvas.height = 300;
        const loveCtx = loveCanvas.getContext('2d');
        loveCtx.fillStyle = 'white';
        loveCtx.font = 'bold 60px "Arial Unicode MS", "Segoe UI"';
        loveCtx.textAlign = 'center';
        loveCtx.textBaseline = 'middle';
        loveCtx.fillText('I LOVE BEBY', 400, 150);
        const loveData = loveCtx.getImageData(0, 0, 800, 300).data;
        for(let y=0; y<300; y+=3) for(let x=0; x<800; x+=3) if(loveData[(y*800+x)*4+3] > 100) loveTextPoints.push({ x: (x-400)/25, y: (150-y)/25 });
        
        // U LOVE GAYIH TOO?
        const victoryCanvas = document.createElement('canvas');
        victoryCanvas.width = 900; victoryCanvas.height = 300;
        const victoryCtx = victoryCanvas.getContext('2d');
        victoryCtx.fillStyle = 'white';
        victoryCtx.font = 'bold 45px "Arial Unicode MS", "Segoe UI"';
        victoryCtx.textAlign = 'center';
        victoryCtx.textBaseline = 'middle';
        victoryCtx.fillText('U LOVE GAYIH TOO?', 450, 150);
        const victoryData = victoryCtx.getImageData(0, 0, 900, 300).data;
        for(let y=0; y<300; y+=3) for(let x=0; x<900; x+=3) if(victoryData[(y*900+x)*4+3] > 100) victoryTextPoints.push({ x: (x-450)/30, y: (150-y)/30 });
        
        // 𖨆𖠋♡𖠋
        const hornCanvas = document.createElement('canvas');
        hornCanvas.width = 600; hornCanvas.height = 300;
        const hornCtx = hornCanvas.getContext('2d');
        hornCtx.fillStyle = 'white';
        hornCtx.font = '80px "Segoe UI", "Arial Unicode MS"';
        hornCtx.textAlign = 'center';
        hornCtx.textBaseline = 'middle';
        hornCtx.fillText('𖨆𖠋♡𖠋', 300, 150);
        const hornData = hornCtx.getImageData(0, 0, 600, 300).data;
        for(let y=0; y<300; y+=3) for(let x=0; x<600; x+=3) if(hornData[(y*600+x)*4+3] > 100) hornSymbolPoints.push({ x: (x-300)/25, y: (150-y)/25 });
        
        // init hand particles
        handGeom = new THREE.BufferGeometry();
        const positions = new Float32Array(HAND_COUNT*3);
        const colors = new Float32Array(HAND_COUNT*3);
        for(let i=0;i<HAND_COUNT;i++){
            positions[i*3] = (Math.random() - 0.5) * 10;
            positions[i*3+1] = (Math.random() - 0.5) * 10;
            positions[i*3+2] = (Math.random() - 0.5) * 10;
            const hue = Math.random();
            const col = new THREE.Color().setHSL(hue, 0.8, 0.6);
            colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
        }
        handGeom.setAttribute('position', new THREE.BufferAttribute(positions,3));
        handGeom.setAttribute('color', new THREE.BufferAttribute(colors,3));
        handColorsAttr = colors;
        
        // Target positions array
        targetHandPositions = new Float32Array(HAND_COUNT * 3);
        for(let i=0; i<HAND_COUNT*3; i++) targetHandPositions[i] = positions[i];
        
        // SHADER MATERIAL (GLASSY & SOFT GLOW)
        const handMat = new THREE.ShaderMaterial({
            transparent: true,
            blending: THREE.AdditiveBlending,
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 7.0 * (250.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    float strength = pow(1.0 - d * 2.0, 2.5);
                    gl_FragColor = vec4(vColor, strength * 0.35);
                }
            `
        });
        
        handParticles = new THREE.Points(handGeom, handMat);
        scene.add(handParticles);
    }
    
    function updateHandShape(type){
        for (let i = 0; i < HAND_COUNT; i++) {
            if (type === "fist") {
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;
                const r = 3.5;
                targetHandPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                targetHandPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                targetHandPositions[i * 3 + 2] = r * Math.cos(phi);
            } else if (type === "open") {
                targetHandPositions[i * 3] = (Math.random() - 0.5) * 50.0;
                targetHandPositions[i * 3 + 1] = (Math.random() - 0.5) * 40.0;
                targetHandPositions[i * 3 + 2] = (Math.random() - 0.5) * 35.0;
            } else if (type === "love") {
                const p = loveTextPoints[i % loveTextPoints.length];
                const noise = (Math.random() - 0.5) * 0.4;
                targetHandPositions[i * 3] = p.x + noise;
                targetHandPositions[i * 3 + 1] = p.y + noise;
                targetHandPositions[i * 3 + 2] = noise;
            } else if (type === "victory") {
                const p = victoryTextPoints[i % victoryTextPoints.length];
                const noise = (Math.random() - 0.5) * 0.4;
                targetHandPositions[i * 3] = p.x + noise;
                targetHandPositions[i * 3 + 1] = p.y + noise;
                targetHandPositions[i * 3 + 2] = noise;
            } else if (type === "horn") {
                const p = hornSymbolPoints[i % hornSymbolPoints.length];
                const noise = (Math.random() - 0.5) * 0.4;
                targetHandPositions[i * 3] = p.x + noise;
                targetHandPositions[i * 3 + 1] = p.y + noise;
                targetHandPositions[i * 3 + 2] = noise;
            }
        }
    }
    
    function stepHandPhysics() {
        if (!handModeActive || !handGeom) return;
        
        const currentPos = handGeom.attributes.position.array;
        
        for (let i = 0; i < HAND_COUNT * 3; i++) {
            currentPos[i] += (targetHandPositions[i] - currentPos[i]) * 0.04;
            currentPos[i] += (Math.random() - 0.5) * 0.015;
        }
        
        handGeom.attributes.position.needsUpdate = true;
        
        const targetVector = new THREE.Vector3(handX, handY, 0);
        handParticles.position.lerp(targetVector, 0.06);
    }
    
    function showGestureToast(msg){
        const el = document.getElementById('gestureToast');
        el.textContent = msg; el.style.display = 'block';
        if(gestureTimer) clearTimeout(gestureTimer);
        gestureTimer = setTimeout(()=>{ el.style.display = 'none'; }, 1500);
    }
    
    async function startHandTracking(){
        if(handCameraInstance) handCameraInstance.stop();
        const video = document.createElement('video'); video.style.display = 'none'; document.body.appendChild(video);
        const hands = new Hands({ locateFile: (f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
        hands.onResults((res)=>{
            if(!handModeActive) return;
            if(res.multiHandLandmarks && res.multiHandLandmarks.length){
                const lm = res.multiHandLandmarks[0];
                const wrist = lm[0], indexTip = lm[8], midTip = lm[12], ringTip = lm[16], pinkyTip = lm[20], thumbTip = lm[4];
                handX = (wrist.x - 0.5)*6; handY = (0.5 - wrist.y)*5;
                const idxFold = indexTip.y > lm[6].y, midFold = midTip.y > lm[10].y, ringFold = ringTip.y > lm[14].y, pinkyFold = pinkyTip.y > lm[18].y;
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const isFist = idxFold && midFold && ringFold && pinkyFold;
                const isOpen = !idxFold && !midFold && !ringFold && !pinkyFold;
                const isVictory = !idxFold && !midFold && ringFold && pinkyFold;
                const isHorn = !idxFold && midFold && ringFold && !pinkyFold;
                const isLovePinch = pinchDist < 0.05;
                
                let shapeType = "fist";
                let toastMsg = null;
                if(isFist){ shapeType = "fist"; toastMsg = "✊🏻 BOLA KRISTAL"; }
                else if(isOpen){ shapeType = "open"; toastMsg = "🖐🏻 MENCAR TOTAL"; }
                else if(isLovePinch){ shapeType = "love"; toastMsg = "🫰🏻 I LOVE BEBY"; }
                else if(isVictory){ shapeType = "victory"; toastMsg = "✌🏻 U LOVE GAYIH TOO?"; }
                else if(isHorn){ shapeType = "horn"; toastMsg = "🤘🏻 SIMBOL"; }
                if(toastMsg) showGestureToast(toastMsg);
                updateHandShape(shapeType);
            }
        });
        const cam = new Camera(video, { onFrame: async()=>{ await hands.send({image:video}); }, width:480, height:360 });
        handCameraInstance = cam;
        cam.start();
    }
    
    function switchMode(mode){
        if(mode === 'slider'){
            handModeActive = false;
            document.getElementById('modeSliderBtn').classList.add('mode-active');
            document.getElementById('modeSliderBtn').classList.remove('mode-inactive');
            document.getElementById('modeHandBtn').classList.add('mode-inactive');
            document.getElementById('modeHandBtn').classList.remove('mode-active');
            document.getElementById('handInfo').style.display = 'none';
            if(sliderParticles) sliderParticles.visible = true;
            if(handParticles) handParticles.visible = false;
            if(handCameraInstance) handCameraInstance.stop();
            if(symbolParticles) symbolParticles.visible = true;
            orbitControls.enabled = true;
            camera.position.set(0, -15, 460);
            orbitControls.target.set(0, 0, 0);
            document.getElementById('globalInfo').innerHTML = '✨ Tulip • Love • Random • Teks ✨';
        } else {
            handModeActive = true;
            document.getElementById('modeHandBtn').classList.add('mode-active');
            document.getElementById('modeHandBtn').classList.remove('mode-inactive');
            document.getElementById('modeSliderBtn').classList.add('mode-inactive');
            document.getElementById('modeSliderBtn').classList.remove('mode-active');
            document.getElementById('handInfo').style.display = 'block';
            if(sliderParticles) sliderParticles.visible = false;
            if(handParticles) handParticles.visible = true;
            if(symbolParticles) symbolParticles.visible = false;
            orbitControls.enabled = true;
            camera.position.set(0, 0, 12);
            orbitControls.target.set(0, 0, 0);
            startHandTracking();
            document.getElementById('globalInfo').innerHTML = '✋ TANGAN MODE — gerakan tangan ubah bentuk ✨';
        }
        orbitControls.update();
    }
    
    // ========== SLIDER MODE GEOMETRY ==========
    async function buildShapes(){
        const tulipCanvas = document.createElement('canvas'); tulipCanvas.width=400; tulipCanvas.height=400;
        const tCtx = tulipCanvas.getContext('2d'); tCtx.fillStyle='white'; tCtx.font='350px serif'; tCtx.textAlign='center'; tCtx.textBaseline='middle'; tCtx.fillText('🌷',200,200);
        const tulipData = tCtx.getImageData(0,0,400,400).data;
        let tulipPts=[];
        for(let y=0;y<400;y++) for(let x=0;x<400;x++) if(tulipData[(y*400+x)*4+3]>100) tulipPts.push({x:(x-200)*0.85, y:(200-y)*0.85});
        const tulipColors = tulipPts.map(p => p.y > -20 ? {r:1,g:0.1,b:0.2} : {r:0.1,g:0.7,b:0.2});
        
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        let heartSamples=[];
        for(let i=0;i<50000;i++){
            const t=Math.random()*Math.PI*2; const hR=Math.pow(Math.random(),0.5)*14;
            const xh=16*Math.pow(Math.sin(t),3); const yh=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            const x=xh*hR, y=yh*hR;
            heartSamples.push({x,y});
            if(x<minX) minX=x; if(x>maxX) maxX=x; if(y<minY) minY=y; if(y>maxY) maxY=y;
        }
        minX-=25; maxX+=25; minY-=25; maxY+=25; const rangeX=maxX-minX, rangeY=maxY-minY;
        
        let randomPts=[];
        for(let i=0;i<PARTICLE_COUNT;i++) randomPts.push({x:(Math.random()-0.5)*340, y:(Math.random()-0.5)*280});
        
        const txtCanvas = document.createElement('canvas'); txtCanvas.width=1200; txtCanvas.height=400;
        const txtCtx = txtCanvas.getContext('2d'); txtCtx.fillStyle='white'; txtCtx.font='bold 95px Arial'; txtCtx.textAlign='center';
        txtCtx.fillText('GAYIH SAYANG',600,150); txtCtx.fillText('BEBY & LAIQA ❤️',600,300);
        const txtData = txtCtx.getImageData(0,0,1200,400).data;
        let teksPts=[];
        for(let y=0;y<400;y+=4) for(let x=0;x<1200;x+=4) if(txtData[(y*1200+x)*4+3]>128) teksPts.push({x:(x-600)*0.95, y:(200-y)*0.95});
        
        for(let i=0;i<PARTICLE_COUNT;i++){
            const tulipIdx = i%tulipPts.length;
            tulipPos.push(tulipPts[tulipIdx].x, tulipPts[tulipIdx].y, (Math.random()-0.5)*40);
            const loveSample = heartSamples[i%heartSamples.length];
            lovePos.push(loveSample.x+(Math.random()-0.5)*5, loveSample.y+(Math.random()-0.5)*5, (Math.random()-0.5)*50);
            const u = (loveSample.x-minX)/rangeX, v = (loveSample.y-minY)/rangeY;
            loveUV.push(Math.min(0.95,Math.max(0.05,u)), Math.min(0.95,Math.max(0.05,v)));
            const rp = randomPts[i];
            randomPos.push(rp.x, rp.y, (Math.random()-0.5)*70);
            randomColorsArr.push(0.7,0.7,0.7);
            const txtPt = teksPts[i%teksPts.length];
            teksPos.push(txtPt.x+(Math.random()-0.5)*3, txtPt.y+(Math.random()-0.5)*3, (Math.random()-0.5)*15);
            teksOrigPos.push(txtPt.x, txtPt.y, (Math.random()-0.5)*15);
            const ang1=Math.random()*Math.PI*2, ang2=Math.random()*Math.PI*2, rad=2+Math.random()*2;
            teksVelocity.push(Math.cos(ang1)*Math.sin(ang2)*rad, Math.sin(ang1)*Math.sin(ang2)*rad, Math.cos(ang2)*rad);
            teksFloat.push((Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2);
        }
        const tulipColorAttr = new Float32Array(PARTICLE_COUNT*3);
        for(let i=0;i<PARTICLE_COUNT;i++){ const col=tulipColors[i%tulipColors.length]; tulipColorAttr[i*3]=col.r; tulipColorAttr[i*3+1]=col.g; tulipColorAttr[i*3+2]=col.b; }
        
        const initPos = new Float32Array(PARTICLE_COUNT*3);
        for(let i=0;i<PARTICLE_COUNT;i++){ initPos[i*3]=lovePos[i*3]; initPos[i*3+1]=lovePos[i*3+1]; initPos[i*3+2]=lovePos[i*3+2]; }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(initPos,3));
        geometry.setAttribute('uvLove', new THREE.BufferAttribute(new Float32Array(loveUV),2));
        geometry.setAttribute('randomColor', new THREE.BufferAttribute(new Float32Array(randomColorsArr),3));
        geometry.setAttribute('tulipColor', new THREE.BufferAttribute(tulipColorAttr,3));
        geometry.setAttribute('teksV', new THREE.BufferAttribute(new Float32Array(teksVelocity),3));
        geometry.setAttribute('teksFloat', new THREE.BufferAttribute(new Float32Array(teksFloat),3));
        const atlasIdx = new Float32Array(PARTICLE_COUNT); for(let i=0;i<PARTICLE_COUNT;i++) atlasIdx[i]=Math.random();
        geometry.setAttribute('atlasIndex', new THREE.BufferAttribute(atlasIdx,1));
        
        const circleTex = (()=>{ const c=document.createElement('canvas');c.width=64;c.height=64;const ct=c.getContext('2d');ct.fillStyle='white';ct.beginPath();ct.arc(32,32,30,0,Math.PI*2);ct.fill();return new THREE.CanvasTexture(c);})();
        const defaultLoveTex = (()=>{const c=document.createElement('canvas');c.width=512;c.height=512;const ct=c.getContext('2d');ct.fillStyle='#ff69b4';ct.fillRect(0,0,512,512);ct.fillStyle='white';ct.font='bold 60px Arial';ct.fillText('❤️',220,300);return new THREE.CanvasTexture(c);})();
        
        shaderMat = new THREE.ShaderMaterial({
            uniforms: { uTexLove:{value:defaultLoveTex}, uTexTeks:{value:defaultLoveTex}, uHasLove:{value:1.0}, uHasTeks:{value:0.0}, uRandomEffect:{value:0.0}, uMix:{value:0.0}, uAtlasSize:{value:1.0}, uTime:{value:0}, uExplodeTime:{value:0}, uSizeScale:{value:0.15}, uCircleTex:{value:circleTex} },
            vertexShader: `
                attribute vec2 uvLove; attribute float atlasIndex; attribute vec3 randomColor; attribute vec3 teksV; attribute vec3 teksFloat; attribute vec3 tulipColor;
                varying vec2 vUvLove; varying float vIdx; varying vec3 vRandomColor; varying vec3 vTulipColor;
                uniform float uMix; uniform float uTime; uniform float uRandomEffect; uniform float uExplodeTime; uniform float uAtlasSize; uniform float uSizeScale;
                void main(){
                    vUvLove=uvLove; vIdx=atlasIndex;
                    if(uRandomEffect>0.5) vRandomColor=randomColor; else vRandomColor=vec3(0.65);
                    vTulipColor=tulipColor;
                    vec3 pos; float stage=uMix*2.0;
                    if(stage<=25.0){ pos=position; pos.x+=sin(uTime*0.6+position.y*0.04)*2.0; pos.y+=cos(uTime*0.5+position.x*0.04)*2.0; }
                    else if(stage<=50.0){ pos=position; pos.x+=sin(uTime*0.7+position.y*0.03)*1.5; pos.y+=cos(uTime*0.6+position.x*0.03)*1.5; }
                    else if(stage<=75.0){ pos=position; pos.x+=sin(uTime*0.8+position.y*0.02)*2.5; pos.y+=cos(uTime*0.7+position.x*0.02)*2.5; }
                    else{ vec3 orig=position; vec3 expOff=teksV*uExplodeTime*2.8; vec3 floatOff=vec3(sin(uTime*0.8+teksFloat.x*8.0)*2.5, cos(uTime*0.6+teksFloat.y*8.0)*2.5, sin(uTime*0.7+teksFloat.z*8.0)*2.5); pos=orig+expOff+floatOff; }
                    vec4 mvPos=modelViewMatrix*vec4(pos,1.0); gl_PointSize=(2.0+uSizeScale*6.0)*(450.0/-mvPos.z); gl_Position=projectionMatrix*mvPos;
                }`,
            fragmentShader: `
                uniform sampler2D uTexLove; uniform sampler2D uTexTeks; uniform sampler2D uCircleTex;
                uniform float uHasLove; uniform float uHasTeks; uniform float uMix; uniform float uAtlasSize; uniform float uTime; uniform float uRandomEffect;
                varying vec2 vUvLove; varying float vIdx; varying vec3 vRandomColor; varying vec3 vTulipColor;
                void main(){
                    vec2 coord=gl_PointCoord; if(length(coord-vec2(0.5))>0.5) discard;
                    vec4 texCol=texture2D(uCircleTex,coord); if(texCol.a<0.5) discard;
                    vec4 col; float stage=uMix*2.0;
                    if(stage<=25.0) col=vec4(vTulipColor,1.0);
                    else if(stage<=50.0){ if(uHasLove>0.5) col=texture2D(uTexLove,vUvLove); else col=vec4(1.0,0.3,0.3,1.0); }
                    else if(stage<=75.0){ if(uRandomEffect>0.5) col=vec4(vRandomColor,1.0); else col=vec4(0.65,0.65,0.65,1.0); }
                    else{ if(uHasTeks>0.5){ float total=uAtlasSize*uAtlasSize; float idx=floor(vIdx*total); vec2 grid=vec2(mod(idx,uAtlasSize),floor(idx/uAtlasSize)); vec2 uv=(vec2(coord.x,1.0-coord.y)+grid)/uAtlasSize; col=texture2D(uTexTeks,uv);} else col=vec4(1.0,1.0,1.0,1.0); }
                    col.rgb+=fract(sin(coord.x*60.0+coord.y*40.0+uTime)*437.58)*0.06;
                    gl_FragColor=col;
                }`,
            transparent:false
        });
        sliderParticles = new THREE.Points(geometry, shaderMat);
        scene.add(sliderParticles);
    }
    
    // ========== DB (LOAD ONLY) ==========
    async function openDB(){
        return new Promise((resolve) => {
            const request = indexedDB.open('Final4StageDB', 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('teks')) db.createObjectStore('teks', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('love')) db.createObjectStore('love', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('random')) db.createObjectStore('random', { keyPath: 'id' });
            };
            request.onsuccess = () => { db = request.result; resolve(); };
            request.onerror = () => resolve();
        });
    }
    
    async function loadFromDB(){
        if(!db) return;
        // Load teks
        const tx1 = db.transaction(['teks'], 'readonly');
        const get1 = tx1.objectStore('teks').get('data');
        get1.onsuccess = () => {
            if(get1.result && get1.result.images && get1.result.images.length > 0){
                const images = get1.result.images;
                const cnt = Math.min(images.length, 100);
                const grid = Math.ceil(Math.sqrt(cnt));
                const canvas = document.createElement('canvas');
                canvas.width = 2048; canvas.height = 2048;
                const ctx = canvas.getContext('2d');
                const cell = 2048 / grid;
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,2048,2048);
                let loaded = 0;
                for(let i=0;i<cnt;i++){
                    const img = new Image();
                    img.onload = ((idx, col, row) => () => {
                        ctx.drawImage(img, col*cell, row*cell, cell, cell);
                        loaded++;
                        if(loaded === cnt){
                            const atlasTex = new THREE.CanvasTexture(canvas);
                            atlasTex.needsUpdate = true;
                            shaderMat.uniforms.uTexTeks.value = atlasTex;
                            shaderMat.uniforms.uHasTeks.value = 1.0;
                            shaderMat.uniforms.uAtlasSize.value = grid;
                        }
                    })(i, i%grid, Math.floor(i/grid));
                    img.src = images[i];
                }
            }
        };
        // Load love
        const tx2 = db.transaction(['love'], 'readonly');
        const get2 = tx2.objectStore('love').get('data');
        get2.onsuccess = () => {
            if(get2.result && get2.result.image){
                const img = new Image();
                img.onload = () => {
                    const tex = new THREE.Texture(img);
                    tex.needsUpdate = true;
                    shaderMat.uniforms.uTexLove.value = tex;
                    shaderMat.uniforms.uHasLove.value = 1.0;
                };
                img.src = get2.result.image;
            }
        };
        // Load random stage 3
        const tx3 = db.transaction(['random'], 'readonly');
        const get3 = tx3.objectStore('random').get('data');
        get3.onsuccess = () => {
            if(get3.result && get3.result.image){
                const b64 = get3.result.image;
                fetch(b64).then(res => res.blob()).then(blob => {
                    const url = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = () => {
                        const cvs = document.createElement('canvas');
                        const ctx = cvs.getContext('2d');
                        cvs.width = 400; cvs.height = 400;
                        ctx.drawImage(img, 0, 0, 400, 400);
                        const data = ctx.getImageData(0,0,400,400).data;
                        const colorsAttr = sliderParticles.geometry.attributes.randomColor.array;
                        for(let i=0;i<PARTICLE_COUNT;i++){
                            const xPos = randomPos[i*3], yPos = randomPos[i*3+1];
                            const canvasX = Math.floor((xPos+200)/400*400);
                            const canvasY = Math.floor((150-yPos)/300*400);
                            if(canvasX>=0 && canvasX<400 && canvasY>=0 && canvasY<400){
                                const idx = (canvasY*400+canvasX)*4;
                                let r=data[idx]/255, g=data[idx+1]/255, b=data[idx+2]/255;
                                r = Math.min(0.9, r*0.85); g = Math.min(0.9, g*0.85); b = Math.min(0.9, b*0.85);
                                const brightness = (r+g+b)/3;
                                const x2=Math.min(canvasX+1,399), y2=Math.min(canvasY+1,399);
                                const idxR = (canvasY*400+x2)*4, idxB = (y2*400+canvasX)*4;
                                const brightnessR = (data[idxR]+data[idxR+1]+data[idxR+2])/(3*255);
                                const brightnessB = (data[idxB]+data[idxB+1]+data[idxB+2])/(3*255);
                                const diff = Math.abs(brightness - brightnessR) + Math.abs(brightness - brightnessB);
                                if(diff > 0.2){
                                    colorsAttr[i*3] = Math.min(0.95, r*1.0);
                                    colorsAttr[i*3+1] = Math.min(0.95, g*1.0);
                                    colorsAttr[i*3+2] = Math.min(0.95, b*1.0);
                                } else {
                                    colorsAttr[i*3] = r*0.8;
                                    colorsAttr[i*3+1] = g*0.8;
                                    colorsAttr[i*3+2] = b*0.8;
                                }
                            }
                        }
                        sliderParticles.geometry.attributes.randomColor.needsUpdate = true;
                        shaderMat.uniforms.uRandomEffect.value = 1.0;
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                });
            }
        };
    }
    
    function showTempMsg(msg, dur=2000){
        const old = document.getElementById('globalInfo').innerHTML;
        document.getElementById('globalInfo').innerHTML = msg;
        setTimeout(() => {
            if(!handModeActive) document.getElementById('globalInfo').innerHTML = '✨ Tulip • Love • Random • Teks ✨';
            else document.getElementById('globalInfo').innerHTML = '✋ TANGAN MODE — gerakan tangan ubah bentuk ✨';
        }, dur);
    }
    
    let animTime = 0;
    function animateLoop(){
        requestAnimationFrame(animateLoop);
        animTime += 0.016;
        if(shaderMat) shaderMat.uniforms.uTime.value = animTime;
        if(isExploding){
            explodeT += (explodeTarget - explodeT) * 0.07;
            shaderMat.uniforms.uExplodeTime.value = explodeT;
            if(Math.abs(explodeTarget - explodeT) < 0.05){ explodeT = explodeTarget; isExploding = false; }
        }
        
        stepHandPhysics();
        
        if(sliderParticles && !handModeActive){
            const posAttr = sliderParticles.geometry.attributes.position.array;
            for(let i=0;i<PARTICLE_COUNT;i++){
                let tx,ty,tz; const m=currentMorph;
                if(m<=12.5){ tx=tulipPos[i*3]; ty=tulipPos[i*3+1]; tz=tulipPos[i*3+2]; }
                else if(m<=25){ const r=(m-12.5)/12.5; tx=tulipPos[i*3]*(1-r)+lovePos[i*3]*r; ty=tulipPos[i*3+1]*(1-r)+lovePos[i*3+1]*r; tz=tulipPos[i*3+2]*(1-r)+lovePos[i*3+2]*r; }
                else if(m<=37.5){ const r=(m-25)/12.5; tx=lovePos[i*3]*(1-r)+randomPos[i*3]*r; ty=lovePos[i*3+1]*(1-r)+randomPos[i*3+1]*r; tz=lovePos[i*3+2]*(1-r)+randomPos[i*3+2]*r; }
                else{ const r=Math.min(1,(m-37.5)/12.5); tx=randomPos[i*3]*(1-r)+teksOrigPos[i*3]*r; ty=randomPos[i*3+1]*(1-r)+teksOrigPos[i*3+1]*r; tz=randomPos[i*3+2]*(1-r)+teksOrigPos[i*3+2]*r; }
                posAttr[i*3] += (tx - posAttr[i*3]) * 0.13;
                posAttr[i*3+1] += (ty - posAttr[i*3+1]) * 0.13;
                posAttr[i*3+2] += (tz - posAttr[i*3+2]) * 0.13;
            }
            sliderParticles.geometry.attributes.position.needsUpdate = true;
            if(document.getElementById('lockRotation').checked) sliderParticles.rotation.y += 0.0025;
        }
        
        if(symbolParticles && !handModeActive){
            if(symbolParticles.material) symbolParticles.material.uniforms.uTime.value = animTime;
        }
        
        if(starField) starField.rotation.y += 0.0004;
        orbitControls.update();
        renderer.render(scene,camera);
    }
</script>
