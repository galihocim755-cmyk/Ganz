<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dual Mode: Slider (Stage3 Upload Foto) + Hand Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 480px; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            border: 1px solid #ff69b4; border-radius: 24px; padding: 12px; color: white; z-index: 10000;
        }
        .mode-buttons { display: flex; gap: 12px; margin-bottom: 12px; }
        .mode-btn { flex: 1; border: none; border-radius: 40px; padding: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .mode-active { background: #ff69b4; color: white; box-shadow: 0 0 8px #ff69b4; }
        .mode-inactive { background: #2a2a3a; color: #aaa; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        input[type=range] { flex: 1; margin: 0 10px; accent-color: #ff69b4; }
        .btn-group { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .btn { border: none; border-radius: 30px; padding: 6px 14px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-blue { background: #1e6091; }
        .btn-red { background: #c1121f; }
        .btn-green { background: #2e7d32; }
        .btn-orange { background: #e67e22; }
        .btn-purple { background: #6a1b9a; }
        .info-text { font-size: 9px; text-align: center; color: #ffb7c5; margin-top: 6px; }
        .size-control { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .gesture-toast { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
          padding: 8px 20px; border-radius: 60px; color: #ffb7c5; font-size: 20px; font-weight: bold; letter-spacing: 2px; z-index: 10001; white-space: nowrap; pointer-events: none; border: 1px solid #ff69b4; }
        @media (max-width: 550px) { .btn { padding: 4px 10px; font-size: 9px; } .info-text { font-size: 8px; } .gesture-toast { font-size: 14px; top: 18%; } }
    </style>
</head>
<body>
<div id="ui-panel">
    <div class="mode-buttons">
        <button id="modeSliderBtn" class="mode-btn mode-active">🎚️ SLIDER MODE</button>
        <button id="modeHandBtn" class="mode-btn mode-inactive">✋ TANGAN MODE</button>
    </div>
    <div id="sliderControls">
        <div class="row">
            <span style="font-size:12px">🔄 <input type="checkbox" id="lockRotation" checked></span>
            <input type="range" id="morphSlider" min="0" max="50" value="50" step="1">
            <button id="resetExplodeBtn" class="btn btn-purple" style="font-size:14px; padding:4px 12px;">↻</button>
        </div>
        <div class="btn-group">
            <button id="explodeBtn" class="btn btn-orange">💥 LEDAK (TEKS)</button>
            <button id="uploadTeksBtn" class="btn btn-blue">📸 RATUSAN FOTO (TEKS)</button>
            <button id="uploadLoveBtn" class="btn btn-red">❤️ FOTO LOVE (1 FOTO)</button>
            <button id="uploadRandomBtn" class="btn btn-green">🎨 UPLOAD FOTO (STAGE 3)</button>
        </div>
        <div class="size-control">
            <span style="font-size:11px">🔘 PARTIKEL SIZE</span>
            <input type="range" id="sizeSlider" min="0" max="100" value="15" step="1">
            <span id="sizeVal">15%</span>
        </div>
    </div>
    <div id="handControls" style="display:none;">
        <div class="info-text">✋ HIDUPKAN KAMERA — gerakan tangan mengubah radius partikel neon ✨</div>
        <div class="info-text" style="margin-top:4px;">✊🏻 mengepal (merapat) • 🖐🏻 terbuka (mencar) • 🫰🏻 love • ✌🏻 peace • 👍🏻 jempol • 🤘 horn</div>
    </div>
    <div class="info-text" id="globalInfo">✨ Tulip(0-12) Ratusan | Love(12-25) 1Foto | Random(25-37) UPLOAD FOTO | Teks(37-50) Ratusan | 💥 ledak | ↻ reset ✨</div>
</div>
<div id="gestureToast" class="gesture-toast" style="display:none;">✨</div>

<input type="file" id="loveFile" style="display:none" accept="image/*">
<input type="file" id="teksFile" style="display:none" accept="image/*" multiple>
<input type="file" id="randomFile" style="display:none" accept="image/*">

<script>
    // ========== SLIDER MODE ==========
    let scene, camera, renderer, sliderParticles, orbitControls, starField;
    const PARTICLE_COUNT = 70000;
    let currentMorph = 50;
    let clock = new THREE.Clock();
    let shaderMat = null;
    
    let tulipPos = [], lovePos = [], teksPos = [], randomPos = [], teksOrigPos = [];
    let loveUV = [], randomColorsArr = [];
    let teksVelocity = [], teksFloat = [];
    let explodeT = 0, explodeTarget = 0, isExploding = false;
    let teksImages = [], loveImage = null, db = null, isUploading = false;
    let currentSizePercent = 15;
    
    // ========== HAND MODE ==========
    let handModeActive = false;
    let handCore = null, handGlow = null, handGeom = null, handBasePos = null;
    const HAND_COUNT = 30000;
    let handX = 0, handY = 0, handRadius = 2.5, targetRadius = 2.5;
    let gestureTimer = null;
    let handCameraInstance = null;
    
    // reset DB
    const deleteDb = indexedDB.deleteDatabase('Final4StageDB');
    deleteDb.onsuccess = () => console.log('DB reset fresh');
    
    setTimeout(() => {
        initApp();
        animateLoop();
    }, 100);
    
    async function initApp(){
        await openDB();
        await loadFromDB();
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.2, 5000);
        camera.position.set(0, -15, 460);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.zoomSpeed = 1.2;
        
        // stars
        const starCount = 7000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0;i<starCount;i++){
            starPos.push((Math.random()-0.5)*6000);
            starPos.push((Math.random()-0.5)*3500);
            starPos.push((Math.random()-0.5)*1800-600);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos),3));
        starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaaccff, size: 0.45, transparent: true, opacity: 0.6 }));
        scene.add(starField);
        
        await buildShapes();
        buildHandParticles();
        
        handCore.visible = false; handGlow.visible = false;
        
        // EVENTS
        document.getElementById('modeSliderBtn').onclick = () => switchMode('slider');
        document.getElementById('modeHandBtn').onclick = () => switchMode('hand');
        document.getElementById('explodeBtn').onclick = () => { if(currentMorph>=37) { explodeTarget=50; isExploding=true; } else showTempMsg('Geser ke stage TEKS (37-50) dulu!'); };
        document.getElementById('resetExplodeBtn').onclick = () => { explodeTarget=0; isExploding=true; };
        document.getElementById('uploadTeksBtn').onclick = () => document.getElementById('teksFile').click();
        document.getElementById('uploadLoveBtn').onclick = () => document.getElementById('loveFile').click();
        document.getElementById('uploadRandomBtn').onclick = () => document.getElementById('randomFile').click();
        
        document.getElementById('loveFile').onchange = handleLoveUpload;
        document.getElementById('teksFile').onchange = handleTeksUpload;
        document.getElementById('randomFile').onchange = handleRandomUpload;
        
        const morphSlider = document.getElementById('morphSlider');
        morphSlider.oninput = (e) => { currentMorph = parseFloat(e.target.value); if(shaderMat) shaderMat.uniforms.uMix.value = currentMorph; if(currentMorph<37){ explodeTarget=0; isExploding=false; shaderMat.uniforms.uExplodeTime.value=0; } };
        const sizeSlider = document.getElementById('sizeSlider');
        sizeSlider.oninput = () => { currentSizePercent = parseFloat(sizeSlider.value); document.getElementById('sizeVal').innerText=Math.floor(currentSizePercent)+'%'; if(shaderMat) shaderMat.uniforms.uSizeScale.value = currentSizePercent/100; };
        sizeSlider.oninput();
        
        morphSlider.value = 0; currentMorph = 0; if(shaderMat) shaderMat.uniforms.uMix.value = 0;
    }
    
    async function buildShapes(){
        // tulip
        const tulipCanvas = document.createElement('canvas'); tulipCanvas.width=400; tulipCanvas.height=400;
        const tCtx = tulipCanvas.getContext('2d'); tCtx.fillStyle='white'; tCtx.font='350px serif'; tCtx.textAlign='center'; tCtx.textBaseline='middle'; tCtx.fillText('🌷',200,200);
        const tulipData = tCtx.getImageData(0,0,400,400).data;
        let tulipPts=[];
        for(let y=0;y<400;y++) for(let x=0;x<400;x++) if(tulipData[(y*400+x)*4+3]>100) tulipPts.push({x:(x-200)*0.85, y:(200-y)*0.85});
        const tulipColors = tulipPts.map(p => p.y > -20 ? {r:1,g:0.1,b:0.2} : {r:0.1,g:0.7,b:0.2});
        
        // love ( heart )
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        let heartSamples=[];
        for(let i=0;i<50000;i++){
            const t=Math.random()*Math.PI*2; const hR=Math.pow(Math.random(),0.5)*14;
            const xh=16*Math.pow(Math.sin(t),3); const yh=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            const x=xh*hR, y=yh*hR;
            heartSamples.push({x,y});
            if(x<minX) minX=x; if(x>maxX) maxX=x; if(y<minY) minY=y; if(y>maxY) maxY=y;
        }
        minX-=25; maxX+=25; minY-=25; maxY+=25; const rangeX=maxX-minX, rangeY=maxY-minY;
        
        let randomPts=[];
        for(let i=0;i<PARTICLE_COUNT;i++) randomPts.push({x:(Math.random()-0.5)*340, y:(Math.random()-0.5)*280});
        
        // teks
        const txtCanvas = document.createElement('canvas'); txtCanvas.width=1200; txtCanvas.height=400;
        const txtCtx = txtCanvas.getContext('2d'); txtCtx.fillStyle='white'; txtCtx.font='bold 95px Arial'; txtCtx.textAlign='center';
        txtCtx.fillText('GAYIH SAYANG',600,150); txtCtx.fillText('BEBY & LAIQA ❤️',600,300);
        const txtData = txtCtx.getImageData(0,0,1200,400).data;
        let teksPts=[];
        for(let y=0;y<400;y+=4) for(let x=0;x<1200;x+=4) if(txtData[(y*1200+x)*4+3]>128) teksPts.push({x:(x-600)*0.95, y:(200-y)*0.95});
        
        for(let i=0;i<PARTICLE_COUNT;i++){
            const tulipIdx = i%tulipPts.length;
            tulipPos.push(tulipPts[tulipIdx].x, tulipPts[tulipIdx].y, (Math.random()-0.5)*40);
            const loveSample = heartSamples[i%heartSamples.length];
            lovePos.push(loveSample.x+(Math.random()-0.5)*5, loveSample.y+(Math.random()-0.5)*5, (Math.random()-0.5)*50);
            const u = (loveSample.x-minX)/rangeX, v = (loveSample.y-minY)/rangeY;
            loveUV.push(Math.min(0.95,Math.max(0.05,u)), Math.min(0.95,Math.max(0.05,v)));
            const rp = randomPts[i];
            randomPos.push(rp.x, rp.y, (Math.random()-0.5)*70);
            randomColorsArr.push(0.7,0.7,0.7);
            const txtPt = teksPts[i%teksPts.length];
            teksPos.push(txtPt.x+(Math.random()-0.5)*3, txtPt.y+(Math.random()-0.5)*3, (Math.random()-0.5)*15);
            teksOrigPos.push(txtPt.x, txtPt.y, (Math.random()-0.5)*15);
            const ang1=Math.random()*Math.PI*2, ang2=Math.random()*Math.PI*2, rad=2+Math.random()*2;
            teksVelocity.push(Math.cos(ang1)*Math.sin(ang2)*rad, Math.sin(ang1)*Math.sin(ang2)*rad, Math.cos(ang2)*rad);
            teksFloat.push((Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2);
        }
        const tulipColorAttr = new Float32Array(PARTICLE_COUNT*3);
        for(let i=0;i<PARTICLE_COUNT;i++){ const col=tulipColors[i%tulipColors.length]; tulipColorAttr[i*3]=col.r; tulipColorAttr[i*3+1]=col.g; tulipColorAttr[i*3+2]=col.b; }
        
        const initPos = new Float32Array(PARTICLE_COUNT*3);
        for(let i=0;i<PARTICLE_COUNT;i++){ initPos[i*3]=lovePos[i*3];initPos[i*3+1]=lovePos[i*3+1];initPos[i*3+2]=lovePos[i*3+2];}
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(initPos,3));
        geometry.setAttribute('uvLove', new THREE.BufferAttribute(new Float32Array(loveUV),2));
        geometry.setAttribute('randomColor', new THREE.BufferAttribute(new Float32Array(randomColorsArr),3));
        geometry.setAttribute('tulipColor', new THREE.BufferAttribute(tulipColorAttr,3));
        geometry.setAttribute('teksV', new THREE.BufferAttribute(new Float32Array(teksVelocity),3));
        geometry.setAttribute('teksFloat', new THREE.BufferAttribute(new Float32Array(teksFloat),3));
        const atlasIdx = new Float32Array(PARTICLE_COUNT); for(let i=0;i<PARTICLE_COUNT;i++) atlasIdx[i]=Math.random();
        geometry.setAttribute('atlasIndex', new THREE.BufferAttribute(atlasIdx,1));
        
        const circleTex = (()=>{ const c=document.createElement('canvas');c.width=64;c.height=64;const ct=c.getContext('2d');ct.fillStyle='white';ct.beginPath();ct.arc(32,32,30,0,Math.PI*2);ct.fill();return new THREE.CanvasTexture(c);})();
        const defaultLoveTex = (()=>{const c=document.createElement('canvas');c.width=512;c.height=512;const ct=c.getContext('2d');ct.fillStyle='#ff69b4';ct.fillRect(0,0,512,512);ct.fillStyle='white';ct.font='bold 60px Arial';ct.fillText('❤️',220,300);return new THREE.CanvasTexture(c);})();
        
        shaderMat = new THREE.ShaderMaterial({
            uniforms: { uTexLove:{value:defaultLoveTex}, uTexTeks:{value:defaultLoveTex}, uHasLove:{value:1.0}, uHasTeks:{value:0.0}, uRandomEffect:{value:0.0}, uMix:{value:0.0}, uAtlasSize:{value:1.0}, uTime:{value:0}, uExplodeTime:{value:0}, uSizeScale:{value:0.15}, uCircleTex:{value:circleTex} },
            vertexShader: `
                attribute vec2 uvLove; attribute float atlasIndex; attribute vec3 randomColor; attribute vec3 teksV; attribute vec3 teksFloat; attribute vec3 tulipColor;
                varying vec2 vUvLove; varying float vIdx; varying vec3 vRandomColor; varying vec3 vTulipColor;
                uniform float uMix; uniform float uTime; uniform float uRandomEffect; uniform float uExplodeTime; uniform float uAtlasSize; uniform float uSizeScale;
                void main(){
                    vUvLove=uvLove; vIdx=atlasIndex;
                    if(uRandomEffect>0.5) vRandomColor=randomColor; else vRandomColor=vec3(0.65);
                    vTulipColor=tulipColor;
                    vec3 pos; float stage=uMix*2.0;
                    if(stage<=25.0){ pos=position; pos.x+=sin(uTime*0.6+position.y*0.04)*2.0; pos.y+=cos(uTime*0.5+position.x*0.04)*2.0; }
                    else if(stage<=50.0){ pos=position; pos.x+=sin(uTime*0.7+position.y*0.03)*1.5; pos.y+=cos(uTime*0.6+position.x*0.03)*1.5; }
                    else if(stage<=75.0){ pos=position; pos.x+=sin(uTime*0.8+position.y*0.02)*2.5; pos.y+=cos(uTime*0.7+position.x*0.02)*2.5; }
                    else{
                        vec3 orig=position; vec3 expOff=teksV*uExplodeTime*2.8;
                        vec3 floatOff=vec3(sin(uTime*0.8+teksFloat.x*8.0)*2.5, cos(uTime*0.6+teksFloat.y*8.0)*2.5, sin(uTime*0.7+teksFloat.z*8.0)*2.5);
                        pos=orig+expOff+floatOff;
                    }
                    vec4 mvPos=modelViewMatrix*vec4(pos,1.0);
                    gl_PointSize=(2.0+uSizeScale*6.0)*(450.0/-mvPos.z);
                    gl_Position=projectionMatrix*mvPos;
                }`,
            fragmentShader: `
                uniform sampler2D uTexLove; uniform sampler2D uTexTeks; uniform sampler2D uCircleTex;
                uniform float uHasLove; uniform float uHasTeks; uniform float uMix; uniform float uAtlasSize; uniform float uTime; uniform float uRandomEffect;
                varying vec2 vUvLove; varying float vIdx; varying vec3 vRandomColor; varying vec3 vTulipColor;
                void main(){
                    vec2 coord=gl_PointCoord; if(length(coord-vec2(0.5))>0.5) discard;
                    vec4 texCol=texture2D(uCircleTex,coord); if(texCol.a<0.5) discard;
                    vec4 col; float stage=uMix*2.0;
                    if(stage<=25.0) col=vec4(vTulipColor,1.0);
                    else if(stage<=50.0){ if(uHasLove>0.5) col=texture2D(uTexLove,vUvLove); else col=vec4(1.0,0.3,0.3,1.0); }
                    else if(stage<=75.0){ 
                        if(uRandomEffect>0.5) col=vec4(vRandomColor,1.0); 
                        else col=vec4(0.65,0.65,0.65,1.0);
                    }
                    else{ if(uHasTeks>0.5){ float total=uAtlasSize*uAtlasSize; float idx=floor(vIdx*total); vec2 grid=vec2(mod(idx,uAtlasSize),floor(idx/uAtlasSize)); vec2 uv=(vec2(coord.x,1.0-coord.y)+grid)/uAtlasSize; col=texture2D(uTexTeks,uv);} else col=vec4(1.0,1.0,1.0,1.0); }
                    col.rgb+=fract(sin(coord.x*60.0+coord.y*40.0+uTime)*437.58)*0.06;
                    gl_FragColor=col;
                }`,
            transparent:false
        });
        sliderParticles = new THREE.Points(geometry, shaderMat);
        scene.add(sliderParticles);
    }
    
    // ========== HAND MODE GEOMETRY ==========
    function buildHandParticles(){
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(HAND_COUNT*3);
        const colors = new Float32Array(HAND_COUNT*3);
        for(let i=0;i<HAND_COUNT;i++){
            positions[i*3]=(Math.random()-0.5)*2.5;
            positions[i*3+1]=(Math.random()-0.5)*2.5;
            positions[i*3+2]=(Math.random()-0.5)*2;
            const hue=Math.random(); const col=new THREE.Color().setHSL(hue,1,0.55);
            colors[i*3]=col.r*1.2; colors[i*3+1]=col.g*1.2; colors[i*3+2]=col.b*1.2;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions,3));
        geom.setAttribute('color', new THREE.BufferAttribute(colors,3));
        const createTex=(innerStrong)=>{
            const s=128,c=document.createElement('canvas'),ctx=c.getContext('2d');
            const grad=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
            if(innerStrong){ grad.addColorStop(0,'rgba(255,255,255,1)');grad.addColorStop(0.7,'rgba(255,255,255,1)');grad.addColorStop(0.9,'rgba(255,255,255,0.3)');grad.addColorStop(1,'rgba(255,255,255,0)');}
            else{ grad.addColorStop(0,'rgba(255,255,255,0.8)');grad.addColorStop(0.3,'rgba(255,255,255,0.4)');grad.addColorStop(1,'rgba(255,255,255,0)');}
            ctx.fillStyle=grad;ctx.fillRect(0,0,s,s);return new THREE.CanvasTexture(c);
        };
        const coreMat = new THREE.PointsMaterial({ size:0.12, map:createTex(true), vertexColors:true, blending:THREE.NormalBlending, transparent:true });
        const glowMat = new THREE.PointsMaterial({ size:0.28, map:createTex(false), vertexColors:true, blending:THREE.AdditiveBlending, transparent:true, opacity:0.65 });
        handCore = new THREE.Points(geom, coreMat);
        handGlow = new THREE.Points(geom, glowMat);
        handGeom = geom;
        handBasePos = positions.slice();
        scene.add(handCore); scene.add(handGlow);
        handCore.visible=false; handGlow.visible=false;
    }
    
    function updateHandRadius(rad){
        if(!handGeom) return;
        const posAttr = handGeom.attributes.position.array;
        for(let i=0;i<HAND_COUNT;i++){
            posAttr[i*3]=(Math.random()-0.5)*rad*2;
            posAttr[i*3+1]=(Math.random()-0.5)*rad*2;
            posAttr[i*3+2]=(Math.random()-0.5)*rad;
        }
        handGeom.attributes.position.needsUpdate=true;
    }
    
    function showGestureToast(msg){
        const el=document.getElementById('gestureToast');
        el.textContent=msg; el.style.display='block';
        if(gestureTimer) clearTimeout(gestureTimer);
        gestureTimer=setTimeout(()=>{ el.style.display='none'; },1300);
    }
    
    async function startHandTracking(){
        if(handCameraInstance) handCameraInstance.stop();
        const video=document.createElement('video'); video.style.display='none'; document.body.appendChild(video);
        const hands=new Hands({ locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
        hands.onResults((res)=>{
            if(!handModeActive) return;
            if(res.multiHandLandmarks && res.multiHandLandmarks.length){
                const lm = res.multiHandLandmarks[0];
                const wrist=lm[0], indexTip=lm[8], midTip=lm[12], ringTip=lm[16], pinkyTip=lm[20], thumbTip=lm[4];
                handX=(wrist.x-0.5)*6; handY=(0.5-wrist.y)*5;
                const idxFold=indexTip.y>lm[6].y, midFold=midTip.y>lm[10].y, ringFold=ringTip.y>lm[14].y, pinkyFold=pinkyTip.y>lm[18].y;
                const pinchDist=Math.hypot(thumbTip.x-indexTip.x, thumbTip.y-indexTip.y);
                const isFist=idxFold&&midFold&&ringFold&&pinkyFold;
                const isOpen=!idxFold&&!midFold&&!ringFold&&!pinkyFold;
                const isVictory=!idxFold&&!midFold&&ringFold&&pinkyFold;
                const isThumbsUp=!idxFold&&midFold&&ringFold&&pinkyFold && thumbTip.y<lm[2].y;
                const isHorn=!idxFold&&midFold&&ringFold&&!pinkyFold;
                let radius=2.5, msg=null;
                if(isFist){ radius=0.8; msg='✊🏻 MERAPAT'; }
                else if(isOpen){ radius=5.2; msg='🖐🏻 MENCAR BESAR'; }
                else if(pinchDist<0.05){ radius=2.2; msg='🫰🏻 I LOVE BEBY'; }
                else if(isVictory){ radius=2.4; msg='✌🏻 U LOVE GAYIH TOO?'; }
                else if(isThumbsUp){ radius=1.8; msg='👍🏻 JEMPOL'; }
                else if(isHorn){ radius=1.9; msg='🤘🏻 HORN ROCK'; }
                targetRadius=radius; handRadius=handRadius*0.85+targetRadius*0.15;
                updateHandRadius(handRadius);
                if(msg) showGestureToast(msg);
                if(handCore){ handCore.position.set(handX,handY,0); handGlow.position.set(handX,handY,0); }
            } else { handRadius=handRadius*0.9+2.0*0.1; updateHandRadius(handRadius); }
        });
        const cam = new Camera(video, { onFrame:async()=>{ await hands.send({image:video}); }, width:480, height:360 });
        handCameraInstance=cam;
        cam.start();
    }
    
    function switchMode(mode){
        if(mode==='slider'){
            handModeActive=false;
            document.getElementById('modeSliderBtn').classList.add('mode-active'); document.getElementById('modeSliderBtn').classList.remove('mode-inactive');
            document.getElementById('modeHandBtn').classList.add('mode-inactive'); document.getElementById('modeHandBtn').classList.remove('mode-active');
            document.getElementById('sliderControls').style.display='block';
            document.getElementById('handControls').style.display='none';
            if(sliderParticles) sliderParticles.visible=true;
            if(handCore) handCore.visible=false;
            if(handGlow) handGlow.visible=false;
            if(handCameraInstance) handCameraInstance.stop();
            orbitControls.enabled=true;
            document.getElementById('globalInfo').innerHTML='✨ Tulip(0-12) Ratusan | Love(12-25) 1Foto | Random(25-37) UPLOAD FOTO | Teks(37-50) Ratusan | 💥 ledak | ↻ reset ✨';
        } else {
            handModeActive=true;
            document.getElementById('modeHandBtn').classList.add('mode-active'); document.getElementById('modeHandBtn').classList.remove('mode-inactive');
            document.getElementById('modeSliderBtn').classList.add('mode-inactive'); document.getElementById('modeSliderBtn').classList.remove('mode-active');
            document.getElementById('sliderControls').style.display='none';
            document.getElementById('handControls').style.display='block';
            if(sliderParticles) sliderParticles.visible=false;
            if(handCore) handCore.visible=true;
            if(handGlow) handGlow.visible=true;
            orbitControls.enabled=true;
            startHandTracking();
            document.getElementById('globalInfo').innerHTML='✋ HAND MODE Aktif — gerakan tangan mengontrol radius/ledakan neon ✨';
        }
    }
    
    // ========== PHOTO UPLOAD & DB (STAGE 3 BISA UPLOAD) ==========
    async function applyPhotoToStage3(file){
        if(!file) return;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
            const cvs = document.createElement('canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = 400;
            cvs.height = 400;
            ctx.drawImage(img, 0, 0, 400, 400);
            const data = ctx.getImageData(0, 0, 400, 400).data;
            const colorsAttr = sliderParticles.geometry.attributes.randomColor.array;
            for(let i=0; i<PARTICLE_COUNT; i++){
                const xPos = randomPos[i*3];
                const yPos = randomPos[i*3+1];
                const canvasX = Math.floor((xPos + 200) / 400 * 400);
                const canvasY = Math.floor((150 - yPos) / 300 * 400);
                if(canvasX>=0 && canvasX<400 && canvasY>=0 && canvasY<400){
                    const idx = (canvasY*400 + canvasX)*4;
                    let r = data[idx]/255;
                    let g = data[idx+1]/255;
                    let b = data[idx+2]/255;
                    r = Math.min(0.9, r * 0.85);
                    g = Math.min(0.9, g * 0.85);
                    b = Math.min(0.9, b * 0.85);
                    const brightness = (r+g+b)/3;
                    const x2 = Math.min(canvasX+1,399);
                    const y2 = Math.min(canvasY+1,399);
                    const idxR = (canvasY*400 + x2)*4;
                    const idxB = (y2*400 + canvasX)*4;
                    const brightnessR = (data[idxR] + data[idxR+1] + data[idxR+2])/(3*255);
                    const brightnessB = (data[idxB] + data[idxB+1] + data[idxB+2])/(3*255);
                    const diff = Math.abs(brightness - brightnessR) + Math.abs(brightness - brightnessB);
                    if(diff > 0.2){
                        colorsAttr[i*3] = Math.min(0.95, r * 1.0);
                        colorsAttr[i*3+1] = Math.min(0.95, g * 1.0);
                        colorsAttr[i*3+2] = Math.min(0.95, b * 1.0);
                    } else {
                        colorsAttr[i*3] = r * 0.8;
                        colorsAttr[i*3+1] = g * 0.8;
                        colorsAttr[i*3+2] = b * 0.8;
                    }
                }
            }
            sliderParticles.geometry.attributes.randomColor.needsUpdate = true;
            shaderMat.uniforms.uRandomEffect.value = 1.0;
            showTempMsg('✅ Stage 3 (Random) warna dari foto!', 2500);
            URL.revokeObjectURL(img.src);
        };
    }
    
    async function openDB(){ return new Promise((resolve)=>{ const req=indexedDB.open('Final4StageDB',1); req.onupgradeneeded=(e)=>{ const db=e.target.result; if(!db.objectStoreNames.contains('teks')) db.createObjectStore('teks',{keyPath:'id'}); if(!db.objectStoreNames.contains('love')) db.createObjectStore('love',{keyPath:'id'}); if(!db.objectStoreNames.contains('random')) db.createObjectStore('random',{keyPath:'id'}); }; req.onsuccess=()=>{ db=req.result; resolve(); }; req.onerror=()=>resolve(); });}
    async function saveTeks(imgs){ if(!db) return; const tx=db.transaction(['teks'],'readwrite'); tx.objectStore('teks').put({id:'data',images:imgs}); }
    async function saveLove(b64){ if(!db) return; const tx=db.transaction(['love'],'readwrite'); tx.objectStore('love').put({id:'data',image:b64}); }
    async function saveRandom(b64){ if(!db) return; const tx=db.transaction(['random'],'readwrite'); tx.objectStore('random').put({id:'data',image:b64}); }
    async function loadFromDB(){
        if(!db) return;
        const tx1=db.transaction(['teks'],'readonly'); const get1=tx1.objectStore('teks').get('data');
        get1.onsuccess=()=>{ if(get1.result){ teksImages=get1.result.images; if(teksImages.length) buildTeksAtlas(teksImages); } };
        const tx2=db.transaction(['love'],'readonly'); const get2=tx2.objectStore('love').get('data');
        get2.onsuccess=()=>{ if(get2.result && get2.result.image){ loveImage=get2.result.image; const img=new Image(); img.onload=()=>{ const tex=new THREE.Texture(img); tex.needsUpdate=true; shaderMat.uniforms.uTexLove.value=tex; shaderMat.uniforms.uHasLove.value=1.0; }; img.src=loveImage; } };
        const tx3=db.transaction(['random'],'readonly'); const get3=tx3.objectStore('random').get('data');
        get3.onsuccess=()=>{ if(get3.result && get3.result.image){ const b64=get3.result.image; fetch(b64).then(res=>res.blob()).then(blob=>{ const file=new File([blob],"saved_stage3.jpg",{type:"image/jpeg"}); applyPhotoToStage3(file); }); } };
    }
    function buildTeksAtlas(images){
        if(!images.length) return;
        const cnt=Math.min(images.length,100); const grid=Math.ceil(Math.sqrt(cnt)); const canvas=document.createElement('canvas'); canvas.width=2048; canvas.height=2048; const ctx=canvas.getContext('2d'); const cell=2048/grid; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,2048,2048);
        let loaded=0;
        for(let i=0;i<cnt;i++){ const img=new Image(); img.onload=((idx,col,row)=>()=>{ ctx.drawImage(img,col*cell,row*cell,cell,cell); loaded++; if(loaded===cnt){ const tex=new THREE.CanvasTexture(canvas); tex.needsUpdate=true; shaderMat.uniforms.uTexTeks.value=tex; shaderMat.uniforms.uHasTeks.value=1.0; shaderMat.uniforms.uAtlasSize.value=grid; } })(i,i%grid,Math.floor(i/grid)); img.src=images[i]; }
    }
    function handleLoveUpload(e){ const f=e.target.files[0]; if(f){ const rd=new FileReader(); rd.onload=(ev)=>{ const b64=ev.target.result; saveLove(b64); const img=new Image(); img.onload=()=>{ const tex=new THREE.Texture(img); tex.needsUpdate=true; shaderMat.uniforms.uTexLove.value=tex; shaderMat.uniforms.uHasLove.value=1.0; }; img.src=b64; }; rd.readAsDataURL(f); } }
    async function handleTeksUpload(e){ if(isUploading) return; isUploading=true; const files=Array.from(e.target.files); if(!files.length){ isUploading=false; return; } for(let i=0;i<files.length && teksImages.length<100;i++){ const b64=await new Promise(r=>{ const rd=new FileReader(); rd.onload=ev=>r(ev.target.result); rd.readAsDataURL(files[i]); }); teksImages.push(b64); } await saveTeks(teksImages); buildTeksAtlas(teksImages); isUploading=false; }
    function handleRandomUpload(e){ const f=e.target.files[0]; if(f){ const rd=new FileReader(); rd.onload=(ev)=>{ const b64=ev.target.result; saveRandom(b64); applyPhotoToStage3(f); }; rd.readAsDataURL(f); } }
    function showTempMsg(msg, dur=2000){ const old=document.getElementById('globalInfo').innerHTML; document.getElementById('globalInfo').innerHTML=msg; setTimeout(()=>{ if(!handModeActive) document.getElementById('globalInfo').innerHTML='✨ Tulip(0-12) Ratusan | Love(12-25) 1Foto | Random(25-37) UPLOAD FOTO | Teks(37-50) Ratusan | 💥 ledak | ↻ reset ✨'; else document.getElementById('globalInfo').innerHTML='✋ HAND MODE Aktif — gerakan tangan mengontrol radius/ledakan neon ✨'; },dur); }
    
    let animTime=0;
    function animateLoop(){
        requestAnimationFrame(animateLoop);
        animTime+=0.016;
        if(shaderMat) shaderMat.uniforms.uTime.value=animTime;
        if(isExploding){
            explodeT+=(explodeTarget-explodeT)*0.07;
            if(shaderMat) shaderMat.uniforms.uExplodeTime.value=explodeT;
            if(Math.abs(explodeTarget-explodeT)<0.05){ explodeT=explodeTarget; isExploding=false; }
        }
        if(sliderParticles && !handModeActive){
            const posAttr = sliderParticles.geometry.attributes.position.array;
            for(let i=0;i<PARTICLE_COUNT;i++){
                let tx,ty,tz; const m=currentMorph;
                if(m<=12.5){ tx=tulipPos[i*3]; ty=tulipPos[i*3+1]; tz=tulipPos[i*3+2]; }
                else if(m<=25){ const r=(m-12.5)/12.5; tx=tulipPos[i*3]*(1-r)+lovePos[i*3]*r; ty=tulipPos[i*3+1]*(1-r)+lovePos[i*3+1]*r; tz=tulipPos[i*3+2]*(1-r)+lovePos[i*3+2]*r; }
                else if(m<=37.5){ const r=(m-25)/12.5; tx=lovePos[i*3]*(1-r)+randomPos[i*3]*r; ty=lovePos[i*3+1]*(1-r)+randomPos[i*3+1]*r; tz=lovePos[i*3+2]*(1-r)+randomPos[i*3+2]*r; }
                else{ const r=Math.min(1,(m-37.5)/12.5); tx=randomPos[i*3]*(1-r)+teksOrigPos[i*3]*r; ty=randomPos[i*3+1]*(1-r)+teksOrigPos[i*3+1]*r; tz=randomPos[i*3+2]*(1-r)+teksOrigPos[i*3+2]*r; }
                posAttr[i*3]+=(tx-posAttr[i*3])*0.13;
                posAttr[i*3+1]+=(ty-posAttr[i*3+1])*0.13;
                posAttr[i*3+2]+=(tz-posAttr[i*3+2])*0.13;
            }
            sliderParticles.geometry.attributes.position.needsUpdate=true;
            if(document.getElementById('lockRotation').checked) sliderParticles.rotation.y+=0.0025;
        } else if(handModeActive && handCore){
            if(handGeom){
                const arr=handGeom.attributes.position.array;
                for(let i=0;i<HAND_COUNT;i++){
                    arr[i*3]+=(Math.sin(animTime*1.3+i)*0.008);
                    arr[i*3+1]+=(Math.cos(animTime*1.1+i)*0.008);
                }
                handGeom.attributes.position.needsUpdate=true;
            }
            handCore.rotation.z=Math.sin(animTime*0.7)*0.08;
            handGlow.rotation.z=Math.sin(animTime*0.7)*0.08;
        }
        if(starField) starField.rotation.y+=0.0004;
        orbitControls.update();
        renderer.render(scene,camera);
    }
